<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Luna Cash Rec</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap');

:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --border: #dde1e9;
  --accent: #1a56db;
  --accent-dim: rgba(26,86,219,0.08);
  --red: #e02424;
  --red-dim: rgba(224,36,36,0.08);
  --green: #057a55;
  --green-dim: rgba(5,122,85,0.08);
  --purple: #7c3aed;
  --purple-dim: rgba(124,58,237,0.08);
  --text: #111827;
  --muted: #6b7280;
  --input-bg: #f9fafb;
  --radius: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  min-height: 100vh;
  padding-bottom: 80px;
}

header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
header h1 { font-size: 13px; font-family: 'DM Mono', monospace; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
header p { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

.week-badge {
  background: var(--accent-dim);
  color: var(--accent);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.06em;
}

/* AUTO-FILL BANNER */
.autofill-banner {
  background: linear-gradient(135deg, var(--purple-dim), var(--accent-dim));
  border: 1px solid var(--purple);
  border-radius: var(--radius);
  margin: 14px 14px 0;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  color: var(--purple);
  letter-spacing: 0.04em;
}
.autofill-banner .af-icon { font-size: 16px; }
.autofill-banner .af-text { flex: 1; }
.autofill-banner .af-close {
  background: none; border: none; color: var(--purple);
  font-size: 16px; cursor: pointer; padding: 0;
  opacity: 0.6;
}
.autofill-banner .af-close:hover { opacity: 1; }

.tabs-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  position: sticky;
  top: 57px;
  z-index: 99;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0;
  padding: 12px 18px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.tab-btn.has-flag { color: var(--red); }
.tab-btn.has-flag.active { border-bottom-color: var(--red); }
.tab-btn.auto-filled { color: var(--purple); }
.tab-btn.auto-filled.active { border-bottom-color: var(--purple); color: var(--purple); }

.add-night-tab {
  flex-shrink: 0;
  padding: 12px 16px;
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  background: none;
  border: none;
  color: var(--accent);
  cursor: pointer;
}

.panel { display: none; padding: 0 0 20px 0; }
.panel.active { display: block; }
.summary-panel { display: none; padding: 0 0 20px 0; }
.summary-panel.active { display: block; }

.section { margin: 14px 14px 0; }
.section-label {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 7px;
  padding-left: 2px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.field {
  display: flex;
  align-items: center;
  padding: 13px 14px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.field:last-child { border-bottom: none; }
.field-label { font-size: 13px; color: var(--muted); min-width: 108px; flex-shrink: 0; }
.field input {
  background: none; border: none; outline: none;
  color: var(--text); font-family: 'DM Mono', monospace;
  font-size: 15px; text-align: right; flex: 1; width: 100%;
}
.field input::placeholder { color: #b0b8c8; }
.field input[type="date"] { font-family: 'DM Sans', sans-serif; font-size: 14px; color-scheme: light; }
.field input[type="text"] { font-family: 'DM Sans', sans-serif; }
.field input.autofilled { color: var(--purple); }

/* AUTO-FILLED FIELD HIGHLIGHT */
.field.was-autofilled {
  background: var(--purple-dim);
  border-left: 3px solid var(--purple);
}

.staff-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 10px;
}
.staff-top {
  display: flex;
  align-items: center;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.staff-name-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600;
}
.staff-name-input::placeholder { color: #b0b8c8; font-weight: 400; }
.staff-name-input.autofilled { color: var(--purple); }
.staff-role-badge {
  font-size: 10px; font-family: 'DM Mono', monospace;
  background: var(--purple-dim); color: var(--purple);
  border: 1px solid rgba(124,58,237,0.2);
  border-radius: 4px; padding: 2px 7px;
  letter-spacing: 0.06em; text-transform: uppercase;
  white-space: nowrap;
}
.staff-amount {
  background: var(--input-bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 11px; width: 105px;
  text-align: right; font-family: 'DM Mono', monospace;
  font-size: 14px; color: var(--text); outline: none;
}
.staff-amount:focus { border-color: var(--accent); }
.staff-amount::placeholder { color: #b0b8c8; }

.receipt-row {
  display: flex;
  align-items: center;
  padding: 10px 14px;
  gap: 10px;
  background: var(--input-bg);
}
.receipt-label { font-size: 12px; color: var(--muted); flex: 1; }
.upload-btn {
  font-size: 12px; font-family: 'DM Mono', monospace;
  background: var(--accent-dim); color: var(--accent);
  border: 1px solid rgba(26,86,219,0.2); border-radius: 6px;
  padding: 6px 12px; cursor: pointer; letter-spacing: 0.04em;
  white-space: nowrap;
}
.thumb-wrap { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 14px 10px; background: var(--input-bg); border-top: 1px solid var(--border); }
.thumb {
  width: 56px; height: 56px; object-fit: cover;
  border-radius: 6px; border: 1px solid var(--border);
  cursor: pointer;
}
.remove-staff {
  background: none; border: none; color: #ccc;
  font-size: 18px; cursor: pointer; padding: 0 2px;
  line-height: 1;
}
.remove-staff:hover { color: var(--red); }

.mgr-upload-area {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 14px; flex-wrap: wrap;
}
.mgr-thumbs { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 14px 12px; }

/* SHIFT NOTES */
.shift-notes-area {
  width: 100%; padding: 12px 14px;
  background: none; border: none; outline: none;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  color: var(--text); resize: none; min-height: 70px;
  line-height: 1.5;
}
.shift-notes-area::placeholder { color: #b0b8c8; }
.shift-notes-area.autofilled { color: var(--purple); font-style: italic; }

/* NET SALES */
.net-sales-display {
  display: flex; justify-content: space-between; align-items: center;
  padding: 13px 14px;
  background: var(--green-dim);
  border-bottom: 1px solid var(--border);
}
.net-sales-display .ns-label { font-size: 13px; color: var(--green); font-weight: 600; }
.net-sales-display .ns-value { font-family: 'DM Mono', monospace; font-size: 16px; color: var(--green); font-weight: 700; }

.spend-row {
  display: flex; align-items: center; gap: 8px;
  padding: 11px 14px; border-bottom: 1px solid var(--border);
}
.spend-row:last-child { border-bottom: none; }
.spend-desc {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px;
}
.spend-desc::placeholder { color: #b0b8c8; }
.spend-amt {
  background: var(--input-bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 11px; width: 95px;
  text-align: right; font-family: 'DM Mono', monospace;
  font-size: 14px; color: var(--red); outline: none;
}
.spend-amt::placeholder { color: #b0b8c8; }
.spend-amt:focus { border-color: var(--red); }
.remove-btn {
  background: none; border: none; color: #ccc;
  font-size: 16px; cursor: pointer; padding: 0;
}
.remove-btn:hover { color: var(--red); }

.add-btn {
  width: 100%; padding: 12px;
  background: none; border: 1px dashed var(--border);
  border-radius: var(--radius); color: var(--muted);
  font-family: 'DM Mono', monospace; font-size: 11px;
  letter-spacing: 0.1em; cursor: pointer; margin-top: 8px;
  text-transform: uppercase;
}
.add-btn:active { background: var(--accent-dim); }

.status-banner {
  margin: 12px 14px 0; padding: 12px 14px;
  border-radius: var(--radius); font-family: 'DM Mono', monospace;
  font-size: 12px; letter-spacing: 0.04em;
  display: flex; justify-content: space-between; align-items: center;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.status-banner.visible { opacity: 1; }
.status-banner.ok { background: var(--green-dim); border: 1px solid var(--green); color: var(--green); }
.status-banner.off { background: var(--red-dim); border: 1px solid var(--red); color: var(--red); }

.result-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.result-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 13px 14px; border-bottom: 1px solid var(--border);
}
.result-row:last-child { border-bottom: none; }
.result-label { font-size: 13px; color: var(--muted); }
.result-value { font-family: 'DM Mono', monospace; font-size: 15px; color: var(--text); }
.result-row.total { background: var(--accent-dim); }
.result-row.total .result-label { color: var(--accent); font-weight: 700; font-size: 14px; }
.result-row.total .result-value { color: var(--accent); font-size: 18px; font-weight: 700; }

.night-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 14px 0;
}
.night-title { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
.delete-night-btn {
  background: none; border: none; color: #ccc;
  font-size: 12px; font-family: 'DM Mono', monospace;
  cursor: pointer; letter-spacing: 0.06em; padding: 4px 0;
}
.delete-night-btn:hover { color: var(--red); }

.summary-night {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 10px;
}
.summary-night-header {
  background: var(--accent); color: white;
  padding: 10px 14px; font-family: 'DM Mono', monospace;
  font-size: 12px; font-weight: 600; letter-spacing: 0.06em;
  display: flex; justify-content: space-between;
}
.summary-night-header.flagged { background: var(--red); }
.summary-row {
  display: flex; justify-content: space-between;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.summary-row:last-child { border-bottom: none; }
.summary-row span:last-child { font-family: 'DM Mono', monospace; font-weight: 600; }

.grand-total-card {
  background: var(--accent); color: white;
  border-radius: var(--radius); padding: 18px 16px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px;
}
.grand-total-card .gt-label { font-size: 12px; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.85; }
.grand-total-card .gt-value { font-size: 28px; font-family: 'DM Mono', monospace; font-weight: 700; }

.action-row {
  display: flex; gap: 10px; margin: 14px 14px 0;
}
.btn-primary {
  flex: 1; padding: 15px 10px;
  background: var(--accent); color: white;
  border: none; border-radius: var(--radius);
  font-family: 'DM Mono', monospace; font-size: 12px;
  letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; font-weight: 600;
}
.btn-secondary {
  flex: 1; padding: 15px 10px;
  background: var(--surface); color: var(--accent);
  border: 1px solid var(--accent); border-radius: var(--radius);
  font-family: 'DM Mono', monospace; font-size: 12px;
  letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; font-weight: 600;
}

.lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.92); z-index: 999;
  justify-content: center; align-items: center;
  padding: 20px;
}
.lightbox.open { display: flex; }
.lightbox img { max-width: 100%; max-height: 90vh; border-radius: 8px; }
.lightbox-close {
  position: absolute; top: 16px; right: 16px;
  background: white; border: none; border-radius: 50%;
  width: 36px; height: 36px; font-size: 20px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

@media print {
  header, .tabs-wrap, .add-btn, .action-row, .delete-night-btn,
  .remove-btn, .remove-staff, .night-header .delete-night-btn,
  .autofill-banner { display: none !important; }
  .panel { display: block !important; }
  .summary-panel { display: block !important; }
}
</style>
</head>
<body>

<header>
  <div>
    <h1>Luna Lounge</h1>
    <p>WEEKLY CASH RECONCILIATION</p>
  </div>
  <div class="week-badge" id="weekBadge">Week of —</div>
</header>

<div class="tabs-wrap" id="tabsWrap">
  <button class="add-night-tab" onclick="addNight()" title="Add night">＋</button>
</div>

<div id="panelsContainer"></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
const BOOKKEEPER = 'accounting@wannerstransport.com';
const BOOKKEEPER_NAME = 'Frances';
let nightCount = 0;
let nights = [];

function fmt(n) {
  if (isNaN(n)) n = 0;
  return '$' + Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function fmtSigned(n) {
  if (isNaN(n) || n === 0) return '$0.00';
  return (n < 0 ? '-' : '') + fmt(n);
}

// ── URL PARAM AUTO-FILL ──────────────────────────────────
function parseURLParams() {
  const params = new URLSearchParams(window.location.search);
  if (!params.has('date') && !params.has('event')) return null;
  return {
    date: params.get('date') || '',
    event: params.get('event') || '',
    manager: params.get('manager') || '',
    bartender: params.get('bartender') || '',
    server: params.get('server') || '',
    barback: params.get('barback') || '',
    hookah: params.get('hookah') || '',
    dj: params.get('dj') || '',
    net_sales: params.get('net_sales') || '',
    toast_expected: params.get('toast_expected') || '',
    toast_final: params.get('toast_final') || '',
    door_cash: params.get('door_cash') || '',
    shift_notes: params.get('shift_notes') || ''
  };
}

function autoFillNight(nightId, data) {
  const set = (suffix, value) => {
    const el = document.getElementById(nightId + suffix);
    if (el && value) {
      el.value = value;
      el.classList.add('autofilled');
      el.closest('.field')?.classList.add('was-autofilled');
    }
  };

  set('-date', data.date);
  set('-manager', data.manager);
  set('-toast-exp', data.toast_expected);
  set('-toast-final', data.toast_final);
  set('-door-total', data.door_cash);
  set('-net-sales', data.net_sales);
  set('-dj', data.dj);

  // Shift notes
  if (data.shift_notes) {
    const notesEl = document.getElementById(nightId + '-shift-notes');
    if (notesEl) {
      notesEl.value = decodeURIComponent(data.shift_notes);
      notesEl.classList.add('autofilled');
    }
  }

  // Staff — add named rows with blank amounts
  const staffRoles = [
    { role: 'Bartender', name: data.bartender },
    { role: 'Server', name: data.server },
    { role: 'Barback', name: data.barback },
    { role: 'Hookah', name: data.hookah }
  ].filter(s => s.name);

  staffRoles.forEach(s => addStaff(nightId, s.name, s.role));

  // Mark tab as auto-filled
  const tab = document.getElementById('tab-' + nightId);
  if (tab) tab.classList.add('auto-filled');

  // Update display fields
  recalcNight(nightId);
  updateWeekBadge();

  // Show banner
  showAutofillBanner(data.event || data.date);
}

function showAutofillBanner(label) {
  const existing = document.getElementById('autofill-banner');
  if (existing) existing.remove();

  const container = document.getElementById('panelsContainer');
  const banner = document.createElement('div');
  banner.id = 'autofill-banner';
  banner.className = 'autofill-banner';
  banner.innerHTML = `
    <span class="af-icon">⚡</span>
    <span class="af-text">Auto-filled from Danny's closing report — <strong>${label}</strong>. Enter staff cash from envelope.</span>
    <button class="af-close" onclick="this.parentElement.remove()">×</button>
  `;
  container.insertBefore(banner, container.firstChild);
}

// ── NIGHT CREATION ──────────────────────────────────────
function addNight(label) {
  nightCount++;
  const id = 'night-' + nightCount;
  const defaultLabels = ['Thu','Fri','Sat','Sun','Mon','Tue','Wed'];
  const tabLabel = label || defaultLabels[(nightCount - 1) % defaultLabels.length];

  const tabsWrap = document.getElementById('tabsWrap');
  const addBtn = tabsWrap.querySelector('.add-night-tab');
  const tab = document.createElement('button');
  tab.className = 'tab-btn';
  tab.id = 'tab-' + id;
  tab.textContent = tabLabel;
  tab.onclick = () => switchTab(id);
  tabsWrap.insertBefore(tab, addBtn);

  const panel = document.createElement('div');
  panel.className = 'panel';
  panel.id = 'panel-' + id;
  panel.innerHTML = buildNightHTML(id, tabLabel, nightCount);
  document.getElementById('panelsContainer').appendChild(panel);

  if (nightCount === 1) buildSummaryTab();

  switchTab(id);
  updateWeekBadge();
  return id;
}

function buildNightHTML(id, label, num) {
  return `
  <div class="night-header">
    <span class="night-title">Night ${num} — ${label}</span>
    <button class="delete-night-btn" onclick="deleteNight('${id}')">Remove Night</button>
  </div>

  <!-- Night Info -->
  <div class="section">
    <div class="section-label">Night Info</div>
    <div class="card">
      <div class="field">
        <span class="field-label">Date</span>
        <input type="date" id="${id}-date" onchange="updateWeekBadge(); recalcNight('${id}')">
      </div>
      <div class="field">
        <span class="field-label">Event</span>
        <input type="text" placeholder="e.g. Thursday" id="${id}-event" style="text-align:right;">
      </div>
      <div class="field">
        <span class="field-label">Manager</span>
        <input type="text" placeholder="Name" id="${id}-manager" style="text-align:right;">
      </div>
      <div class="field">
        <span class="field-label">DJ</span>
        <input type="text" placeholder="Name" id="${id}-dj" style="text-align:right;">
      </div>
    </div>
  </div>

  <!-- Sales -->
  <div class="section">
    <div class="section-label">Sales</div>
    <div class="card">
      <div class="field">
        <span class="field-label">Net Sales</span>
        <input type="number" placeholder="0.00" id="${id}-net-sales" step="0.01">
      </div>
      <div class="field">
        <span class="field-label">Toast Expected</span>
        <input type="number" placeholder="0.00" id="${id}-toast-exp" step="0.01" oninput="recalcNight('${id}')">
      </div>
      <div class="field">
        <span class="field-label">Toast Final</span>
        <input type="number" placeholder="0.00" id="${id}-toast-final" step="0.01" oninput="recalcNight('${id}')">
      </div>
    </div>
  </div>

  <!-- Manager Report Upload -->
  <div class="section">
    <div class="section-label">Manager Closing Report</div>
    <div class="card">
      <div class="mgr-upload-area">
        <span style="font-size:13px;color:var(--muted);flex:1;">Attach closing report</span>
        <label class="upload-btn">
          📎 Upload
          <input type="file" accept="image/*,application/pdf" multiple style="display:none"
            onchange="handleMgrUpload(event,'${id}-mgr-thumbs')">
        </label>
      </div>
      <div class="mgr-thumbs" id="${id}-mgr-thumbs"></div>
    </div>
  </div>

  <!-- Staff Cash -->
  <div class="section">
    <div class="section-label">Staff Cash Owed</div>
    <div id="${id}-staff-list"></div>
    <button class="add-btn" onclick="addStaff('${id}')">+ Add Staff Member</button>
  </div>

  <!-- Door Cash -->
  <div class="section">
    <div class="section-label">Door Cash</div>
    <div class="card">
      <div class="field">
        <span class="field-label">Door Total</span>

      </div>

function spendRowHTML(id) {
  return `<div class="spend-row">
    <input class="spend-desc" type="text" placeholder="Description (e.g. supplies)">
    <input class="spend-amt" type="number" placeholder="0.00" step="0.01" oninput="recalcNight('${id}')">
    <button class="remove-btn" onclick="this.parentElement.remove();recalcNight('${id}')">×</button>
  </div>`;
}

// ── STAFF BLOCK ──────────────────────────────────────────
let staffCount = 0;
function addStaff(nightId, prefillName, prefillRole) {
  staffCount++;
  const sid = nightId + '-s' + staffCount;
  const list = document.getElementById(nightId + '-staff-list');
  const block = document.createElement('div');
  block.className = 'staff-block';
  block.id = sid + '-block';

  const roleBadge = prefillRole
    ? `<span class="staff-role-badge">${prefillRole}</span>`
    : '';

  block.innerHTML = `
    <div class="staff-top">
      <input class="staff-name-input ${prefillName ? 'autofilled' : ''}" type="text"
        placeholder="Staff name" value="${prefillName || ''}">
      ${roleBadge}
      <input class="staff-amount" type="number" placeholder="0.00" step="0.01"
        id="${sid}-amt" oninput="recalcNight('${nightId}')">
      <button class="remove-staff" onclick="document.getElementById('${sid}-block').remove();recalcNight('${nightId}')">×</button>
    </div>
    <div class="receipt-row">
      <span class="receipt-label">📄 Shift receipt</span>
      <label class="upload-btn">
        Upload
        <input type="file" accept="image/*" multiple style="display:none"
          onchange="handleReceiptUpload(event,'${sid}-thumbs')">
      </label>
    </div>
    <div class="thumb-wrap" id="${sid}-thumbs" style="display:none;"></div>
  `;
  list.appendChild(block);
}

// ── UPLOADS ──────────────────────────────────────────────
function handleReceiptUpload(event, thumbsId) {
  const container = document.getElementById(thumbsId);
  container.style.display = 'flex';
  Array.from(event.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.createElement('img');
      img.src = e.target.result;
      img.className = 'thumb';
      img.onclick = () => openLightbox(e.target.result);
      container.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
}

function handleMgrUpload(event, thumbsId) {
  const container = document.getElementById(thumbsId);
  Array.from(event.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.createElement('img');
      img.src = e.target.result;
      img.className = 'thumb';
      img.onclick = () => openLightbox(e.target.result);
      container.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ── RECALC ───────────────────────────────────────────────
function recalcNight(id) {
  const el = s => document.getElementById(id + s);
  const val = s => parseFloat(el(s)?.value) || 0;

  const panel = document.getElementById('panel-' + id);
  let staffSum = 0;
  panel.querySelectorAll('.staff-amount').forEach(i => staffSum += parseFloat(i.value) || 0);

  const doorTotal = val('-door-total');
  const doorHalf = doorTotal / 2;
  el('-door-half').textContent = doorTotal ? fmt(doorHalf) : '—';

  let spendSum = 0;
  panel.querySelectorAll('.spend-amt').forEach(i => spendSum += parseFloat(i.value) || 0);

  const deposit = staffSum + doorHalf - spendSum;

  el('-r-staff').textContent = fmt(staffSum);
  el('-r-door').textContent = fmt(doorHalf);
  el('-r-spend').textContent = spendSum > 0 ? '(' + fmt(spendSum).slice(1) + ')' : '$0.00';
  el('-r-deposit').textContent = fmt(deposit);

  const toastExp = val('-toast-exp');
  const banner = el('-status');
  const tab = document.getElementById('tab-' + id);
  if (toastExp > 0 && staffSum > 0) {
    const diff = staffSum - toastExp;
    banner.classList.add('visible');
    if (Math.abs(diff) <= 1.00) {
      banner.className = 'status-banner visible ok';
      banner.innerHTML = `<span>✓ Cash matches Toast</span><span>${diff === 0 ? 'EXACT' : (diff > 0 ? '+' : '') + fmt(Math.abs(diff))}</span>`;
      tab.classList.remove('has-flag');
    } else {
      banner.className = 'status-banner visible off';
      banner.innerHTML = `<span>⚠ Discrepancy</span><span>${(diff > 0 ? '+' : '-') + fmt(Math.abs(diff))}</span>`;
      tab.classList.add('has-flag');
    }
  } else {
    banner.className = 'status-banner';
    tab.classList.remove('has-flag');
  }

  updateSummary();
}

// ── TABS ─────────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel, .summary-panel').forEach(p => p.classList.remove('active'));
  const tab = document.getElementById('tab-' + id);
  const panel = document.getElementById('panel-' + id) || document.getElementById('panel-summary');
  if (tab) tab.classList.add('active');
  if (panel) panel.classList.add('active');
}

// ── DELETE NIGHT ─────────────────────────────────────────
function deleteNight(id) {
  if (!confirm('Remove this night?')) return;
  document.getElementById('tab-' + id)?.remove();
  document.getElementById('panel-' + id)?.remove();
  const firstTab = document.querySelector('.tab-btn');
  if (firstTab) firstTab.click();
  updateSummary();
}

// ── SUMMARY TAB ──────────────────────────────────────────
function buildSummaryTab() {
  const tabsWrap = document.getElementById('tabsWrap');
  const addBtn = tabsWrap.querySelector('.add-night-tab');

  const tab = document.createElement('button');
  tab.className = 'tab-btn';
  tab.id = 'tab-summary';
  tab.textContent = 'Summary';
  tab.onclick = () => { updateSummary(); switchTab('summary'); };
  tabsWrap.insertBefore(tab, addBtn);

  const panel = document.createElement('div');
  panel.className = 'summary-panel';
  panel.id = 'panel-summary';
  panel.innerHTML = `
    <div class="section" style="margin-top:14px;">
      <div class="grand-total-card" id="grand-total-card">
        <div>
          <div class="gt-label">Weekly Deposit</div>
          <div style="font-size:11px;opacity:0.7;font-family:'DM Mono',monospace;margin-top:2px;">All nights combined</div>
        </div>
        <div class="gt-value" id="grand-total-val">$0.00</div>
      </div>
      <div id="summary-nights"></div>
    </div>
    <div class="action-row">
      <button class="btn-primary" onclick="emailFrances()">✉ Email Frances</button>
      <button class="btn-secondary" onclick="downloadReport()">⬇ Download</button>
    </div>
  `;
  document.getElementById('panelsContainer').appendChild(panel);
}

function updateSummary() {
  const container = document.getElementById('summary-nights');
  if (!container) return;
  let grandTotal = 0;
  let html = '';

  document.querySelectorAll('.panel').forEach(panel => {
    const id = panel.id.replace('panel-', '');
    const dateEl = document.getElementById(id + '-date');
    const mgrEl = document.getElementById(id + '-manager');
    if (!dateEl) return;

    const date = dateEl.value || '—';
    const mgr = mgrEl?.value || '—';

    let staffSum = 0;
    panel.querySelectorAll('.staff-amount').forEach(i => staffSum += parseFloat(i.value) || 0);
    const doorTotal = parseFloat(document.getElementById(id + '-door-total')?.value) || 0;
    const doorHalf = doorTotal / 2;
    let spendSum = 0;
    panel.querySelectorAll('.spend-amt').forEach(i => spendSum += parseFloat(i.value) || 0);
    const deposit = staffSum + doorHalf - spendSum;
    const toastExp = parseFloat(document.getElementById(id + '-toast-exp')?.value) || 0;
    const diff = toastExp > 0 ? staffSum - toastExp : null;
    const flagged = diff !== null && Math.abs(diff) > 1;

    grandTotal += deposit;

    html += `<div class="summary-night">
      <div class="summary-night-header ${flagged ? 'flagged' : ''}">
        <span>${date} — Mgr: ${mgr}</span>
        <span>${flagged ? '⚠ DISCREPANCY' : '✓ OK'}</span>
      </div>
      <div class="summary-row"><span>Staff Cash</span><span>${fmt(staffSum)}</span></div>
      <div class="summary-row"><span>Door (Luna's Half)</span><span>${fmt(doorHalf)}</span></div>
      <div class="summary-row"><span>Manager Spend</span><span style="color:var(--red)">${spendSum > 0 ? '(' + fmt(spendSum).slice(1) + ')' : '$0.00'}</span></div>
      <div class="summary-row" style="font-weight:600;background:var(--accent-dim)"><span>Deposit</span><span style="color:var(--accent)">${fmt(deposit)}</span></div>
      ${flagged ? `<div class="summary-row" style="color:var(--red);font-size:12px;font-family:'DM Mono',monospace"><span>Cash vs Toast diff</span><span>${(diff > 0 ? '+' : '-') + fmt(Math.abs(diff))}</span></div>` : ''}
    </div>`;
  });

  container.innerHTML = html;
  const gtEl = document.getElementById('grand-total-val');
  if (gtEl) gtEl.textContent = fmt(grandTotal);
}

    grandTotal += deposit;

// ── WEEK BADGE ───────────────────────────────────────────
function updateWeekBadge() {
  const dates = [];
  document.querySelectorAll('[id$="-date"]').forEach(el => {
    if (el.value) dates.push(new Date(el.value));
  });
  if (dates.length === 0) return;
  dates.sort((a,b) => a-b);
  const opts = { month: 'short', day: 'numeric' };
  const badge = document.getElementById('weekBadge');
  if (dates.length === 1) {
    badge.textContent = 'Week of ' + dates[0].toLocaleDateString('en-US', opts);
  } else {
    badge.textContent = dates[0].toLocaleDateString('en-US', opts) + ' – ' + dates[dates.length-1].toLocaleDateString('en-US', opts);
  }
}

  addNight('Thu');
  addNight('Fri');
  addNight('Sat');
  const firstId = 'night-1';
  addStaff(firstId);
  addStaff(firstId);
}
